<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enlace de Motor de Exportación - Space Lab</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Grotesk:wght@400;600;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(17, 25, 40, 0.65);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent-primary: #3b82f6;
            --accent-secondary: #8b5cf6;
            --accent-success: #10b981;
            --accent-error: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Fondo de Partículas Galácticas */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(59, 130, 246, 0.15) 0%, transparent 40%);
            z-index: 1;
        }

        /* Cuadrícula espacial decorativa */
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 2;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 500px;
        }

        /* Tarjeta de Cristal (Glassmorphism) */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Animación de Enlace Visual */
        .link-animation-box {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            position: relative;
        }

        .node {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            position: relative;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
            transition: all 0.5s ease;
        }

        .node-left {
            background: linear-gradient(135deg, var(--accent-secondary), #d946ef);
        }

        .node-right {
            background: linear-gradient(135deg, var(--accent-primary), #06b6d4);
        }

        .connection-beam {
            width: 80px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }

        .connection-pulse {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, #ffffff, transparent);
            animation: pulse-flow 2s infinite linear;
        }

        @keyframes pulse-flow {
            0% {
                left: -100%;
            }

            100% {
                left: 100%;
            }
        }

        /* Estados de Éxito y Error */
        .connected .node {
            background: var(--accent-success) !important;
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.6);
        }

        .connected .connection-beam {
            background: var(--accent-success);
            box-shadow: 0 0 15px var(--accent-success);
        }

        .connected .connection-pulse {
            display: none;
        }

        /* Tipografía */
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.8rem;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
            background: linear-gradient(90deg, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Botón de Enlace */
        .btn-connect {
            width: 100%;
            padding: 16px 28px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            color: #ffffff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.25);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-connect:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(139, 92, 246, 0.4);
            filter: brightness(1.1);
        }

        .btn-connect:active {
            transform: translateY(1px);
        }

        .btn-connect::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: all 0.6s ease;
        }

        .btn-connect:hover::before {
            left: 100%;
        }

        /* Estado del Botón */
        .btn-success {
            background: var(--accent-success) !important;
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3) !important;
            cursor: default;
        }

        /* Alerta de Estado */
        .status-alert {
            margin-top: 20px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            display: none;
            text-align: center;
        }

        .alert-error {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
            display: block;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            75% {
                transform: translateX(5px);
            }
        }

        /* Footer */
        .footer-info {
            margin-top: 30px;
            font-size: 0.8rem;
            color: var(--text-muted);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 20px;
        }

        .footer-info a {
            color: var(--accent-primary);
            text-decoration: none;
        }

        .footer-info a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="grid-bg"></div>

    <div class="container">
        <div id="card" class="glass-card">
            <div id="link-box" class="link-animation-box">
                <div class="node node-left" title="Navegador Web">🌐</div>
                <div class="connection-beam">
                    <div class="connection-pulse"></div>
                </div>
                <div class="node node-right" title="Motor Local Python">⚙️</div>
            </div>

            <h1 id="title">Enlazar Motor Local</h1>
            <p id="description">
                Detectamos una solicitud de conexión segura para activar la exportación premium (PDF impecable y Word
                nativo).
            </p>

            <button id="btn-connect" class="btn-connect">
                <span id="btn-icon">⚡</span>
                <span id="btn-text">Vincular con Motor Local</span>
            </button>

            <div id="status-message" class="status-alert"></div>

            <div class="footer-info">
                Desarrollado por Samuel Pablo | <a href="index.html">Ir al Panel de Control</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const btnConnect = document.getElementById('btn-connect');
            const btnText = document.getElementById('btn-text');
            const btnIcon = document.getElementById('btn-icon');
            const card = document.getElementById('card');
            const linkBox = document.getElementById('link-box');
            const title = document.getElementById('title');
            const description = document.getElementById('description');
            const statusMessage = document.getElementById('status-message');

            // Extraer el token de seguridad desde la URL
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (!token) {
                statusMessage.className = 'status-alert alert-error';
                statusMessage.textContent = 'Falta el token de enlace seguro. Asegúrate de abrir la URL enviada por el ejecutable.';
                btnConnect.disabled = true;
                btnConnect.style.opacity = '0.5';
                return;
            }

            btnConnect.addEventListener('click', async () => {
                btnConnect.disabled = true;
                btnText.textContent = 'Comprobando conexión...';

                try {
                    // Hacer la validación al endpoint de Python local
                    const response = await fetch(`http://127.0.0.1:8000/verificar-token?token=${token}`);

                    if (!response.ok) {
                        if (response.status === 401) {
                            throw new Error('TOKEN_EXPIRED');
                        }
                        const err = await response.json();
                        throw new Error(err.detail || 'Fallo de autenticación.');
                    }

                    const data = await response.json();

                    // Si conecta, guardar datos en localStorage
                    localStorage.setItem('backend_connected', 'true');
                    localStorage.setItem('connection_token', token);

                    // Efecto visual de Conectado
                    linkBox.classList.add('connected');
                    btnConnect.className = 'btn-connect btn-success';
                    btnIcon.textContent = '✓';
                    btnText.textContent = '¡Enlace Exitoso!';

                    title.textContent = 'Motor Enlazado';
                    title.style.background = 'linear-gradient(90deg, #10b981, #34d399)';
                    title.style.webkitBackgroundClip = 'text';

                    description.textContent = 'El motor de exportación local en Python ha sido vinculado correctamente. Redirigiéndote al editor...';
                    statusMessage.style.display = 'none';

                    // Redirección suave
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2200);

                } catch (error) {
                    console.error('[Error de enlace]', error);
                    btnConnect.disabled = false;
                    btnIcon.textContent = '⚡';
                    btnText.textContent = 'Vincular con Motor Local';

                    statusMessage.className = 'status-alert alert-error';
                    if (error.message === 'TOKEN_EXPIRED') {
                        statusMessage.textContent = '❌ El token de enlace está vencido. Haz clic en "[ CLIC AQUÍ PARA VINCULAR ]" en la ventana de pablitopyhost.exe para abrir la pestaña correcta.';
                    } else {
                        statusMessage.textContent = '❌ No se pudo establecer conexión. Verifica que pablitopyhost.exe esté abierto.';
                    }
                }
            });
        });
    </script>
</body>

</html>
